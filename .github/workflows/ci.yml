name: CI

on:
  workflow_dispatch:
    inputs:
      upload_wheel:
        description: 'whether/where to upload the wheel'
        required: false
        default: 'no'
        type: 'choice'
        options: ['no', 'pypi', 'testpypi']

      publish_npm:
        description: 'whether to publish the npm packages'
        required: false
        default: 'no'
        type: 'choice'
        options: ['no', 'yes']

  pull_request:
    branches:
      - main

jobs:
  check_version:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/check_version.py

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-binary-cache
      CIBW_ENVIRONMENT_LINUX: "VCPKG_DEFAULT_BINARY_CACHE=/project/vcpkg-binary-cache"
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-15-intel]
        # os: [ubuntu-latest, macos-13, macos-14]
        # os: [windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short_sha

      - name: Create vcpkg binary cache directory
        shell: bash
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-binary-cache
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.1

      - uses: ilammy/msvc-dev-cmd@v1 

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.29.6'

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
        with:
          version: 1.11.1

      - name: Bootstrap vcpkg
        run: |
          git submodule update --init --recursive
          python bootstrap_vcpkg.py

      - name: Run C++ unit tests
        shell: bash
        run: |
          cmake --preset release
          cmake --build build/release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          ctest --test-dir build/release/vectorlite --output-on-failure

      # Build wheels using cibuildwheel
      # The build system uses scikit-build-core (configured in pyproject.toml)
      # which handles CMake integration and wheel packaging
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: vectorlite-wheel-${{ matrix.os }}-${{ steps.short_sha.outputs.sha }}
          path: ./wheelhouse/*.whl

      # The wheels are tested with a uv-managed CPython 3.14 because it has
      # loadable SQLite extensions enabled (the interpreters bundled with
      # cibuildwheel and actions/setup-python do not) and ships a recent SQLite.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.14 test environment
        shell: bash
        run: |
          ws="$(pwd)"
          uv python install 3.14
          uv venv --python 3.14 "${ws}/.venv-test"
          if [ -f "${ws}/.venv-test/bin/python" ]; then
            echo "TEST_PYTHON=${ws}/.venv-test/bin/python" >> "$GITHUB_ENV"
          else
            echo "TEST_PYTHON=${ws}/.venv-test/Scripts/python.exe" >> "$GITHUB_ENV"
          fi

      - name: Run Python integration tests against built wheel
        shell: bash
        run: |
          uv pip install --python "$TEST_PYTHON" pytest numpy
          for wheel in wheelhouse/*.whl; do
            echo "Installing $wheel"
            uv pip install --python "$TEST_PYTHON" "$wheel" --reinstall
          done
          "$TEST_PYTHON" -m pytest --import-mode=importlib bindings/python/vectorlite_py/test

      - name: Get release version
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/v')
        shell: bash
        run: |
          echo "RELEASE_VERSION=$(echo ${{ github.ref_name }} | sed -E 's/^release\///')" >> $GITHUB_ENV

      - name: Upload wheels to release assets
        if: ${{ github.event_name == 'workflow_dispatch' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/')) }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release upload ${{ env.RELEASE_VERSION }} ./wheelhouse/*.whl --clobber
      
      - name: Run python examples
        shell: bash
        run: |

          uv pip install --python "$TEST_PYTHON" -r examples/requirements.txt
          # Reinstall the freshly built wheel last so it wins over the PyPI copy
          # pulled in by examples/requirements.txt.
          for wheel in wheelhouse/*.whl; do
            uv pip install --python "$TEST_PYTHON" "$wheel" --reinstall
          done
          for example in examples/*.py; do
            echo "Running $example"
            "$TEST_PYTHON" "$example"
          done

      - name: Run benchmark
        working-directory: benchmark
        shell: bash
        run: |
          uv pip install --python "$TEST_PYTHON" -r requirements.txt
          # Reinstall the freshly built wheel last so it wins over the PyPI copy.
          for wheel in ../wheelhouse/*.whl; do
            uv pip install --python "$TEST_PYTHON" "$wheel" --reinstall
          done
          "$TEST_PYTHON" benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}-${{ steps.short_sha.outputs.sha }}
          path: ./benchmark/vector*.png


  upload_wheels:
    name: Upload wheels
    if: ${{ github.event.inputs.upload_wheel != 'no' && github.event_name != 'pull_request' }}
    needs: build_wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short_sha
    
      # Download all artifacts
      - uses: actions/download-artifact@v4
        with:
          path: ./wheelhouse

      - name: Upload to test.pypi.org
        if: ${{ github.event.inputs.upload_wheel == 'testpypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: pipx run twine upload --repository testpypi wheelhouse/**/*.whl
      
      - name: Upload to pypi.org
        if: ${{ github.event.inputs.upload_wheel == 'pypi' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/')) }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: pipx run twine upload wheelhouse/**/*.whl

      - name: Fail if uploading to pypi.org without a tag
        if: ${{ github.event.inputs.upload_wheel == 'pypi' && !(startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/')) }}
        run: | 
          echo "Error: Uploading to pypi.org requires a tag"
          exit 1

  publish_npm_pkgs:
    name: Upload npm packages
    if: ${{ github.event.inputs.publish_npm == 'yes' && github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/')) }}
    needs: build_wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short_sha
    
      # Download all artifacts
      - uses: actions/download-artifact@v4
        with:
          path: ./wheelhouse

      # extract vectorlite from wheels and copy to nodejs bindings directory
      - name: unzip wheels
        run: |
          sh extract_wheels.sh

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Test locally
        working-directory: bindings/nodejs/packages/vectorlite
        run: |
          npm i -D
          npm link ../vectorlite-linux-x64
          npm run test

      - name: Publish to npm
        working-directory: bindings/nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          mv package.json.tpl package.json
          npm publish --workspaces --access public

